<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ledger</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --navy: #0A457D;
    --highlight: #A7CDEE;
    --border: #d8e6f3;
    --border-strong: #A7CDEE;
    --text-secondary: #4A6A8A;
    --text-muted: #8AA8C4;
    --text-danger: #c0392b;
    --text-success: #1e8449;
    --bg: #fff;
    --text: #0A457D;
    --row-hover: #eef6fc;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  [data-theme="dark"] {
    --border: #1f3b54;
    --border-strong: #2c557a;
    --text-secondary: #9fc1de;
    --text-muted: #6a8cab;
    --bg: #0d2238;
    --text: #eaf2fa;
    --row-hover: #16314b;
    --highlight: #A7CDEE;
  }
  body { margin: 0; padding: 0; color: var(--text); background: var(--bg); }
  .page { max-width: 900px; margin: 0 auto; padding: 0 24px 24px; box-sizing: border-box; }
  .topbar { background: var(--navy); color: #fff; padding: 18px 24px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
  .topbar h3 { margin: 0; color: #fff; }
  .topbar .subtitle { font-size: 13px; color: var(--highlight); }
  .topbar-actions { display: flex; align-items: center; gap: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 4px; color: var(--text); font-weight: 600; border-bottom: 2px solid var(--navy); }
  td { padding: 8px 4px; border-bottom: 1px solid var(--border); }
  input, button { font-size: 13px; padding: 7px 9px; border: 1px solid var(--border-strong); border-radius: 6px; color: var(--text); background: var(--bg); box-sizing: border-box; height: 36px; }
  input:focus, button:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 2px var(--highlight); }
  button { cursor: pointer; }
  button:hover { background: var(--highlight); color: #0A457D; }
  button#in-add, button#out-add { background: var(--navy); color: #fff; border-color: var(--navy); font-weight: 600; width: 36px; padding: 0; flex-shrink: 0; }
  button#in-add:hover, button#out-add:hover { background: #08365f; }
  .edit-actions .save-btn { background: var(--navy); color: #fff; border-color: var(--navy); }
  .edit-actions .save-btn:hover { background: #08365f; }
  h3 { margin: 0 0 8px; color: var(--text); }
  .add-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
  .add-row input { flex-shrink: 0; }
  .add-row input[type="date"] { flex: 1; min-width: 0; }
  .add-row input[placeholder="Customer"], .add-row input[placeholder="Supplier"] { flex: 1; min-width: 0; }
  .del-btn { border: none; background: none; cursor: pointer; color: var(--text-muted); padding: 0; }
  tr.row { cursor: pointer; }
  tr.row:active, tr.row:hover { background: var(--row-hover); }
  tr.editing { background: var(--row-hover); }
  tr.editing td { padding: 8px 4px; }
  tr.editing input { width: 100%; }
  .edit-actions { display: flex; gap: 6px; margin-top: 6px; }
  .edit-actions button { flex: 1; padding: 8px; height: auto; }
  .edit-actions .delete-btn { color: var(--text-danger); border-color: var(--text-danger); }
  #login-screen { max-width: 320px; margin: 80px auto; display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; }
  #login-screen input, #login-screen button { width: 100%; }
  #login-screen #login-btn { background: var(--navy); color: #fff; border-color: var(--navy); font-weight: 600; }
  #login-screen #login-btn:hover { background: #08365f; }
  #app { display: none; }
  .error { color: var(--text-danger); font-size: 13px; }
  .total-row { display: flex; justify-content: space-between; margin-top: 12px; padding: 10px 12px; background: var(--row-hover); border-radius: 6px; font-weight: 600; }
  .balance-row { margin-top: 16px; padding: 16px; background: var(--navy); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; color: #fff; }
  .balance-row span:first-child { font-weight: 600; font-size: 16px; }
  #balance { font-weight: 700; font-size: 22px; color: var(--highlight); }
  #theme-toggle { width: 36px; height: 36px; padding: 0; background: transparent; color: #fff; border-color: rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center; }
  #theme-toggle:hover { background: rgba(255,255,255,0.15); color: #fff; }
  #logout-btn { background: transparent; color: #fff; border-color: rgba(255,255,255,0.5); }
  #logout-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
</style>
</head>
<body>

<div id="login-screen">
  <h3 style="margin-bottom:0; color:#0A457D;">Miri Concrete</h3>
  <div style="font-size:14px; color:var(--text-secondary); margin-bottom:8px;">Daily Ledger</div>
  <input type="password" id="password-input" placeholder="Password" />
  <button id="login-btn">Unlock</button>
  <div class="error" id="login-error"></div>
</div>

<div id="app">
  <div class="topbar">
    <div>
      <h3>Miri Concrete</h3>
      <div class="subtitle">Daily Ledger</div>
    </div>
    <div class="topbar-actions">
      <button id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">&#9789;</button>
      <button id="logout-btn">Sign out</button>
    </div>
  </div>

  <div class="page">
  <div style="display:flex; align-items:center; gap:8px; margin-bottom:16px; flex-wrap:wrap;">
    <label style="font-size:13px; color:var(--text-secondary);">From</label>
    <input type="date" id="range-start" />
    <label style="font-size:13px; color:var(--text-secondary);">To</label>
    <input type="date" id="range-end" />
    <button id="reset-range">Last 7 days</button>
  </div>

  <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
    <div>
      <h3>Received</h3>
      <table>
        <thead>
          <tr><th>Date</th><th>Customer</th><th>Bill #</th><th style="text-align:right;">Amount in</th></tr>
        </thead>
        <tbody id="in-body"></tbody>
      </table>
      <div class="add-row">
        <input type="date" id="in-date" />
        <input type="text" id="in-customer" placeholder="Customer" />
        <input type="text" id="in-bill" placeholder="Bill #" style="width:80px;" />
        <input type="number" id="in-amount" placeholder="Amount" style="width:90px;" />
        <button id="in-add">+</button>
      </div>
      <div class="total-row">
        <span>Total received</span><span id="in-total">0.00</span>
      </div>
    </div>

    <div>
      <h3>Paid</h3>
      <table>
        <thead>
          <tr><th>Date</th><th>Supplier</th><th>Bill #</th><th style="text-align:right;">Amount out</th></tr>
        </thead>
        <tbody id="out-body"></tbody>
      </table>
      <div class="add-row">
        <input type="date" id="out-date" />
        <input type="text" id="out-supplier" placeholder="Supplier" />
        <input type="text" id="out-bill" placeholder="Bill #" style="width:80px;" />
        <input type="number" id="out-amount" placeholder="Amount" style="width:90px;" />
        <button id="out-add">+</button>
      </div>
      <div class="total-row">
        <span>Total paid</span><span id="out-total">0.00</span>
      </div>
    </div>
  </div>

  <div class="balance-row">
    <span>Balance</span>
    <span id="balance">0.00</span>
  </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://nykvifpqbldhfkpthgef.supabase.co';
const SUPABASE_KEY = 'sb_publishable_1uI5rkXuVSbZvE8EuNT4Kw_5hZfm9J0';
const FIXED_EMAIL = 'miriconcrete@hotmail.com';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let rows = [];

function fmt(n){ return Number(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }
function toISO(d){ return d.toISOString().slice(0,10); }

function setDefaultRange(){
  const end = new Date();
  const start = new Date();
  start.setDate(end.getDate() - 6);
  document.getElementById('range-start').value = toISO(start);
  document.getElementById('range-end').value = toISO(end);
}

function inRange(dateStr){
  const start = document.getElementById('range-start').value;
  const end = document.getElementById('range-end').value;
  if (!dateStr) return false;
  if (start && dateStr < start) return false;
  if (end && dateStr > end) return false;
  return true;
}

let editingId = null;

function rowHTML(row){
  if (row.id === editingId) {
    return `<tr class="editing" data-id="${row.id}">
      <td colspan="4">
        <div style="display:flex; gap:6px; margin-bottom:4px;">
          <input type="date" class="edit-date" value="${row.date||''}" style="flex:1;" />
          <input type="text" class="edit-party" value="${row.party||''}" placeholder="${row.type==='in'?'Customer':'Supplier'}" style="flex:1;" />
        </div>
        <div style="display:flex; gap:6px; margin-bottom:4px;">
          <input type="text" class="edit-bill" value="${row.bill_number||''}" placeholder="Bill #" style="flex:1;" />
          <input type="number" class="edit-amount" value="${row.amount||''}" placeholder="Amount" style="width:90px;" />
        </div>
        <div class="edit-actions">
          <button class="save-btn">Save</button>
          <button class="cancel-btn">Cancel</button>
          <button class="delete-btn">Delete</button>
        </div>
      </td>
    </tr>`;
  }
  return `<tr class="row" data-id="${row.id}">
    <td>${row.date||''}</td><td>${row.party||''}</td><td>${row.bill_number||''}</td><td style="text-align:right;">${fmt(row.amount)}</td>
  </tr>`;
}

function render(){
  const inBody = document.getElementById('in-body');
  const outBody = document.getElementById('out-body');
  inBody.innerHTML = '';
  outBody.innerHTML = '';
  let totalIn = 0, totalOut = 0;

  rows.filter(r => r.type === 'in').forEach(row => {
    if (!inRange(row.date)) return;
    totalIn += Number(row.amount) || 0;
    inBody.insertAdjacentHTML('beforeend', rowHTML(row));
  });

  rows.filter(r => r.type === 'out').forEach(row => {
    if (!inRange(row.date)) return;
    totalOut += Number(row.amount) || 0;
    outBody.insertAdjacentHTML('beforeend', rowHTML(row));
  });

  document.getElementById('in-total').textContent = fmt(totalIn);
  document.getElementById('out-total').textContent = fmt(totalOut);
  const bal = totalIn - totalOut;
  const balEl = document.getElementById('balance');
  balEl.textContent = (bal < 0 ? '-' : '') + fmt(Math.abs(bal));
  balEl.style.color = bal < 0 ? '#ff8a80' : 'var(--highlight)';

  document.querySelectorAll('tr.row').forEach(tr => {
    tr.onclick = () => { editingId = tr.dataset.id; render(); };
  });

  const editTr = document.querySelector('tr.editing');
  if (editTr) {
    editTr.querySelector('.cancel-btn').onclick = () => { editingId = null; render(); };
    editTr.querySelector('.save-btn').onclick = () => saveEdit(editTr.dataset.id, editTr);
    editTr.querySelector('.delete-btn').onclick = () => {
      if (confirm('Delete this entry?')) deleteRow(editTr.dataset.id);
    };
  }
}

async function saveEdit(id, editTr){
  const date = editTr.querySelector('.edit-date').value;
  const party = editTr.querySelector('.edit-party').value;
  const bill_number = editTr.querySelector('.edit-bill').value;
  const amount = editTr.querySelector('.edit-amount').value;
  if (!date || !amount) return;
  const { error } = await sb.from('transactions').update({ date, party, bill_number, amount }).eq('id', id);
  if (error) { console.error(error); alert('Failed to save: ' + error.message); return; }
  editingId = null;
  await loadRows();
}

async function loadRows(){
  const { data, error } = await sb.from('transactions').select('*').order('date', { ascending: false });
  if (error) { console.error(error); return; }
  rows = data;
  render();
}

async function addRow(type, date, party, bill_number, amount){
  const { data: { user } } = await sb.auth.getUser();
  const { error } = await sb.from('transactions').insert({
    user_id: user.id, type, date, party, bill_number, amount
  });
  if (error) { console.error(error); alert('Failed to save: ' + error.message); return; }
  await loadRows();
}

async function deleteRow(id){
  const { error } = await sb.from('transactions').delete().eq('id', id);
  if (error) { console.error(error); return; }
  await loadRows();
}

document.getElementById('range-start').onchange = render;
document.getElementById('range-end').onchange = render;
document.getElementById('reset-range').onclick = () => { setDefaultRange(); render(); };

document.getElementById('in-add').onclick = () => {
  const date = document.getElementById('in-date').value;
  const customer = document.getElementById('in-customer').value;
  const bill = document.getElementById('in-bill').value;
  const amount = document.getElementById('in-amount').value;
  if (!amount || !date) return;
  addRow('in', date, customer, bill, amount);
  document.getElementById('in-customer').value = '';
  document.getElementById('in-bill').value = '';
  document.getElementById('in-amount').value = '';
};

document.getElementById('out-add').onclick = () => {
  const date = document.getElementById('out-date').value;
  const supplier = document.getElementById('out-supplier').value;
  const bill = document.getElementById('out-bill').value;
  const amount = document.getElementById('out-amount').value;
  if (!amount || !date) return;
  addRow('out', date, supplier, bill, amount);
  document.getElementById('out-supplier').value = '';
  document.getElementById('out-bill').value = '';
  document.getElementById('out-amount').value = '';
};

document.getElementById('theme-toggle').onclick = () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  setTheme(isDark ? 'light' : 'dark');
};

function setTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('theme', theme);
  document.getElementById('theme-toggle').innerHTML = theme === 'dark' ? '&#9728;' : '&#9789;';
}

(function initTheme(){
  const saved = localStorage.getItem('theme');
  const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  setTheme(saved || (prefersDark ? 'dark' : 'light'));
})();

document.getElementById('logout-btn').onclick = async () => {
  await sb.auth.signOut();
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
};

document.getElementById('login-btn').onclick = login;
document.getElementById('password-input').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

async function login(){
  const password = document.getElementById('password-input').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  const { error } = await sb.auth.signInWithPassword({ email: FIXED_EMAIL, password });
  if (error) { errEl.textContent = 'Incorrect password.'; return; }
  showApp();
}

async function showApp(){
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  setDefaultRange();
  await loadRows();
}

async function init(){
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    showApp();
  } else {
    document.getElementById('login-screen').style.display = 'flex';
  }
}

init();
</script>
</body>
</html>
