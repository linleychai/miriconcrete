<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ledger</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --navy: #0A457D;
    --highlight: #A7CDEE;
    --bg: #ffffff;
    --surface: #ffffff;
    --text: #111111;
    --text-secondary: #555555;
    --text-muted: #999999;
    --border: #e0e0e0;
    --border-strong: #cccccc;
    --row-hover: #f4f4f4;
    --text-danger: #c0392b;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  [data-theme="dark"] {
    --bg: #0c0c0c;
    --surface: #0c0c0c;
    --text: #f2f2f2;
    --text-secondary: #aaaaaa;
    --text-muted: #777777;
    --border: #2a2a2a;
    --border-strong: #3a3a3a;
    --row-hover: #1a1a1a;
  }
  body { margin: 0; padding: 0; color: var(--text); background: var(--bg); }
  .page { max-width: 900px; margin: 0 auto; padding: 0 24px 24px; box-sizing: border-box; }
  .topbar { background: var(--navy); color: #fff; padding: 18px 24px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
  .topbar h3 { margin: 0; color: #fff; }
  .topbar .subtitle { font-size: 13px; color: var(--highlight); }
  .topbar-actions { display: flex; align-items: center; gap: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  col.col-date { width: 22%; }
  col.col-party { width: 32%; }
  col.col-bill { width: 22%; }
  col.col-amount { width: 24%; }
  th { text-align: left; padding: 8px 4px; color: var(--text); font-weight: 600; border-bottom: 2px solid var(--navy); }
  td { padding: 8px 4px; border-bottom: 1px solid var(--border); overflow: hidden; }
  tr.filler-row td { border-bottom: none; }
  tr.filler-row:hover { background: none; }
  tr.filler-row { cursor: default; }
  td.sticky-date { position: sticky; top: 0; background: var(--bg); z-index: 2; }
  td.blank-date { color: var(--text-muted); }
  tfoot td { border-bottom: none; padding-top: 10px; }
  input, button { font-size: 13px; padding: 7px 8px; border: 1px solid var(--border-strong); border-radius: 6px; color: var(--text); background: var(--surface); box-sizing: border-box; height: 36px; width: 100%; }
  input:focus, button:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 2px var(--highlight); }
  button { cursor: pointer; }
  button:hover { background: var(--row-hover); }
  button#in-add, button#out-add { background: var(--navy); color: #fff; border-color: var(--navy); font-weight: 600; }
  button#in-add:hover, button#out-add:hover { background: #08365f; }
  .edit-actions .save-btn { background: var(--navy); color: #fff; border-color: var(--navy); }
  .edit-actions .save-btn:hover { background: #08365f; }
  h3 { margin: 0 0 8px; color: var(--text); }
  .del-btn { border: none; background: none; cursor: pointer; color: var(--text-muted); padding: 0; }
  tr.row { cursor: pointer; }
  tr.row:active, tr.row:hover { background: var(--row-hover); }
  tr.editing { background: var(--row-hover); }
  tr.editing td { padding: 8px 4px; }
  .edit-actions { display: flex; gap: 6px; margin-top: 6px; }
  .edit-actions button { flex: 1; padding: 8px; height: auto; width: auto; }
  .edit-actions .delete-btn { color: var(--text-danger); border-color: var(--text-danger); }
  #login-screen { max-width: 320px; margin: 80px auto; display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; }
  #login-screen input, #login-screen button { width: 100%; }
  #login-screen #login-btn { background: var(--navy); color: #fff; border-color: var(--navy); font-weight: 600; }
  #login-screen #login-btn:hover { background: #08365f; }
  #app { display: none; }
  .error { color: var(--text-danger); font-size: 13px; }
  .total-row { display: flex; justify-content: space-between; margin-top: 12px; padding: 10px 12px; background: var(--row-hover); border-radius: 6px; font-weight: 600; }
  .balance-row { margin-top: 16px; padding: 16px; background: var(--navy); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; color: #fff; }
  .balance-row span:first-child { font-weight: 600; font-size: 16px; }
  #balance { font-weight: 700; font-size: 22px; color: var(--highlight); }
  #theme-toggle { width: 36px; height: 36px; padding: 0; background: transparent; color: #fff; border-color: rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center; }
  #theme-toggle:hover { background: rgba(255,255,255,0.15); color: #fff; }
  #logout-btn { width: auto; background: transparent; color: #fff; border-color: rgba(255,255,255,0.5); }
  #logout-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
  .range-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .range-row input[type="date"], .range-row input[type="number"] { width: auto; }
  .range-row button { width: auto; }
  .range-row label { font-size: 13px; color: var(--text-secondary); }
  .columns { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; position: relative; }
  .date-divider { position: absolute; left: 0; right: 0; height: 0; border-top: 2px solid var(--border-strong); pointer-events: none; }

  @media (max-width: 700px) {
    .page { padding: 0 0 24px; }
    .range-row { padding: 0 16px; }
    .balance-row { margin-left: 16px; margin-right: 16px; }
    .columns {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-padding: 0 16px;
      -webkit-overflow-scrolling: touch;
      gap: 0;
      padding: 0 0 4px;
    }
    .columns > div {
      flex: 0 0 100%;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      padding: 0 16px;
      box-sizing: border-box;
    }
    .swipe-hint { display: flex; justify-content: center; gap: 6px; margin: 8px 0 16px; }
    .swipe-hint span { width: 6px; height: 6px; border-radius: 50%; background: var(--border-strong); }
    .swipe-hint span.active { background: var(--navy); }
    tr.filler-row { display: none; }
  }
  .swipe-hint { display: none; }
</style>
</head>
<body>

<div id="login-screen">
  <h3 style="margin-bottom:0;">Miri Concrete</h3>
  <div style="font-size:14px; color:var(--text-secondary); margin-bottom:8px;">Daily Ledger</div>
  <input type="password" id="password-input" placeholder="Password" />
  <button id="login-btn">Unlock</button>
  <div class="error" id="login-error"></div>
</div>

<div id="app">
  <div class="topbar">
    <div>
      <h3>Miri Concrete</h3>
      <div class="subtitle">Daily Ledger</div>
    </div>
    <div class="topbar-actions">
      <button id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">&#9789;</button>
      <button id="logout-btn">Sign out</button>
    </div>
  </div>

  <div class="page">
  <div class="range-row">
    <label>From</label>
    <input type="date" id="range-start" />
    <label>To</label>
    <input type="date" id="range-end" />
    <button id="reset-range">Last 7 days</button>
  </div>

  <div class="total-row" id="opening-balance-row" style="margin-bottom:16px;">
    <span>Opening balance</span><span id="opening-balance-display">0.00</span>
  </div>

  <div class="columns">
    <div>
      <h3>Received</h3>
      <table id="in-table">
        <colgroup>
          <col class="col-date"><col class="col-party"><col class="col-bill"><col class="col-amount">
        </colgroup>
        <thead>
          <tr><th>Date</th><th>Customer</th><th>Bill #</th><th style="text-align:right;">Amount in</th></tr>
        </thead>
        <tfoot>
          <tr>
            <td><input type="date" id="in-date" /></td>
            <td><input type="text" id="in-customer" placeholder="Customer" /></td>
            <td><input type="text" id="in-bill" placeholder="Bill #" /></td>
            <td><input type="number" id="in-amount" placeholder="Amount" /></td>
          </tr>
          <tr>
            <td colspan="4"><button id="in-add" style="width:100%;">Add</button></td>
          </tr>
        </tfoot>
      </table>
      <div class="total-row">
        <span>Total received</span><span id="in-total">0.00</span>
      </div>
    </div>

    <div>
      <h3>Paid</h3>
      <table id="out-table">
        <colgroup>
          <col class="col-date"><col class="col-party"><col class="col-bill"><col class="col-amount">
        </colgroup>
        <thead>
          <tr><th>Date</th><th>Supplier</th><th>Bill #</th><th style="text-align:right;">Amount out</th></tr>
        </thead>
        <tfoot>
          <tr>
            <td><input type="date" id="out-date" /></td>
            <td><input type="text" id="out-supplier" placeholder="Supplier" /></td>
            <td><input type="text" id="out-bill" placeholder="Bill #" /></td>
            <td><input type="number" id="out-amount" placeholder="Amount" /></td>
          </tr>
          <tr>
            <td colspan="4"><button id="out-add" style="width:100%;">Add</button></td>
          </tr>
        </tfoot>
      </table>
      <div class="total-row">
        <span>Total paid</span><span id="out-total">0.00</span>
      </div>
    </div>
  </div>

  <div class="swipe-hint" id="swipe-hint"><span class="dot active"></span><span class="dot"></span></div>

  <div class="balance-row">
    <span>Ending balance</span>
    <span id="balance">0.00</span>
  </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://nykvifpqbldhfkpthgef.supabase.co';
const SUPABASE_KEY = 'sb_publishable_1uI5rkXuVSbZvE8EuNT4Kw_5hZfm9J0';
const FIXED_EMAIL = 'miriconcrete@hotmail.com';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let rows = [];

function fmt(n){ return Number(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }
function toISO(d){ return d.toISOString().slice(0,10); }

function setDefaultRange(){
  const end = new Date();
  const start = new Date();
  start.setDate(end.getDate() - 6);
  document.getElementById('range-start').value = toISO(start);
  document.getElementById('range-end').value = toISO(end);
}

function inRange(dateStr){
  const start = document.getElementById('range-start').value;
  const end = document.getElementById('range-end').value;
  if (!dateStr) return false;
  if (start && dateStr < start) return false;
  if (end && dateStr > end) return false;
  return true;
}

let editingId = null;

function rowHTML(row, showDate){
  if (row.id === editingId) {
    return `<tr class="editing" data-id="${row.id}">
      <td colspan="4">
        <div style="display:flex; gap:6px; margin-bottom:4px;">
          <input type="date" class="edit-date" value="${row.date||''}" style="flex:1;" />
          <input type="text" class="edit-party" value="${row.party||''}" placeholder="${row.type==='in'?'Customer':'Supplier'}" style="flex:1;" />
        </div>
        <div style="display:flex; gap:6px; margin-bottom:4px;">
          <input type="text" class="edit-bill" value="${row.bill_number||''}" placeholder="Bill #" style="flex:1;" />
          <input type="number" class="edit-amount" value="${row.amount||''}" placeholder="Amount" style="width:110px;" />
        </div>
        <div class="edit-actions">
          <button class="save-btn">Save</button>
          <button class="cancel-btn">Cancel</button>
          <button class="delete-btn">Delete</button>
        </div>
      </td>
    </tr>`;
  }
  const dateCell = showDate
    ? `<td class="sticky-date">${row.date||''}</td>`
    : `<td class="blank-date"></td>`;
  return `<tr class="row" data-id="${row.id}">
    ${dateCell}<td>${row.party||''}</td><td>${row.bill_number||''}</td><td style="text-align:right;">${fmt(row.amount)}</td>
  </tr>`;
}

function groupedBodyHTML(list){
  let html = '';
  let i = 0;
  while (i < list.length) {
    const date = list[i].date;
    let group = '';
    let first = true;
    while (i < list.length && list[i].date === date) {
      const row = list[i];
      group += rowHTML(row, row.id === editingId ? true : first);
      first = false;
      i++;
    }
    html += `<tbody class="date-group" data-date="${date}">${group}</tbody>`;
  }
  return html;
}

function render(){
  const inTable = document.getElementById('in-table');
  const outTable = document.getElementById('out-table');
  inTable.querySelectorAll('tbody.date-group').forEach(el => el.remove());
  outTable.querySelectorAll('tbody.date-group').forEach(el => el.remove());

  let totalIn = 0, totalOut = 0;

  const inRows = rows.filter(r => r.type === 'in' && inRange(r.date));
  const outRows = rows.filter(r => r.type === 'out' && inRange(r.date));

  inRows.forEach(r => totalIn += Number(r.amount) || 0);
  outRows.forEach(r => totalOut += Number(r.amount) || 0);

  inTable.insertAdjacentHTML('beforeend', groupedBodyHTML(inRows));
  outTable.insertAdjacentHTML('beforeend', groupedBodyHTML(outRows));

  document.getElementById('in-total').textContent = fmt(totalIn);
  document.getElementById('out-total').textContent = fmt(totalOut);

  const start = document.getElementById('range-start').value;
  const end = document.getElementById('range-end').value;

  let openingIn = 0, openingOut = 0;
  let endingIn = 0, endingOut = 0;
  rows.forEach(r => {
    if (!r.date) return;
    const amt = Number(r.amount) || 0;
    if (start && r.date < start) {
      if (r.type === 'in') openingIn += amt; else openingOut += amt;
    }
    if (!end || r.date <= end) {
      if (r.type === 'in') endingIn += amt; else endingOut += amt;
    }
  });

  const opening = openingIn - openingOut;
  document.getElementById('opening-balance-display').textContent = (opening < 0 ? '-' : '') + fmt(Math.abs(opening));

  const bal = endingIn - endingOut;
  const balEl = document.getElementById('balance');
  balEl.textContent = (bal < 0 ? '-' : '') + fmt(Math.abs(bal));
  balEl.style.color = bal < 0 ? '#ff8a80' : 'var(--highlight)';

  document.querySelectorAll('tr.row:not(.filler-row)').forEach(tr => {
    tr.onclick = () => { editingId = tr.dataset.id; render(); };
  });

  const editTr = document.querySelector('tr.editing');
  if (editTr) {
    editTr.querySelector('.cancel-btn').onclick = () => { editingId = null; render(); };
    editTr.querySelector('.save-btn').onclick = () => saveEdit(editTr.dataset.id, editTr);
    editTr.querySelector('.delete-btn').onclick = () => {
      if (confirm('Delete this entry?')) deleteRow(editTr.dataset.id);
    };
  }

  requestAnimationFrame(() => requestAnimationFrame(drawDividers));
  setTimeout(drawDividers, 80);
}

function drawDividers(){
  const container = document.querySelector('.columns');
  if (!container) return;
  container.querySelectorAll('.date-divider').forEach(el => el.remove());

  if (window.innerWidth <= 700) return;

  const containerRect = container.getBoundingClientRect();
  const inGroups = [...document.querySelectorAll('#in-table tbody.date-group')];
  const outGroups = [...document.querySelectorAll('#out-table tbody.date-group')];
  const dates = Array.from(new Set([
    ...inGroups.map(g => g.dataset.date),
    ...outGroups.map(g => g.dataset.date)
  ]));

  dates.forEach(date => {
    const inG = inGroups.find(g => g.dataset.date === date);
    const outG = outGroups.find(g => g.dataset.date === date);
    let bottom = -Infinity;
    if (inG) bottom = Math.max(bottom, inG.getBoundingClientRect().bottom);
    if (outG) bottom = Math.max(bottom, outG.getBoundingClientRect().bottom);
    if (bottom === -Infinity) return;
    const top = bottom - containerRect.top;
    const div = document.createElement('div');
    div.className = 'date-divider';
    div.style.top = top + 'px';
    container.appendChild(div);
  });
}

window.addEventListener('resize', () => requestAnimationFrame(drawDividers));
window.addEventListener('load', drawDividers);

async function saveEdit(id, editTr){
  const date = editTr.querySelector('.edit-date').value;
  const party = editTr.querySelector('.edit-party').value;
  const bill_number = editTr.querySelector('.edit-bill').value;
  const amount = editTr.querySelector('.edit-amount').value;
  if (!date || !amount) return;
  const { error } = await sb.from('transactions').update({ date, party, bill_number, amount }).eq('id', id);
  if (error) { console.error(error); alert('Failed to save: ' + error.message); return; }
  editingId = null;
  await loadRows();
}

async function loadRows(){
  const { data, error } = await sb.from('transactions').select('*').order('date', { ascending: true }).order('created_at', { ascending: true });
  if (error) { console.error(error); return; }
  rows = data;
  render();
}

async function addRow(type, date, party, bill_number, amount){
  const { data: { user } } = await sb.auth.getUser();
  const { error } = await sb.from('transactions').insert({
    user_id: user.id, type, date, party, bill_number, amount
  });
  if (error) { console.error(error); alert('Failed to save: ' + error.message); return; }
  await loadRows();
}

async function deleteRow(id){
  const { error } = await sb.from('transactions').delete().eq('id', id);
  if (error) { console.error(error); return; }
  await loadRows();
}

document.getElementById('range-start').onchange = render;
document.getElementById('range-end').onchange = render;
document.getElementById('reset-range').onclick = () => { setDefaultRange(); render(); };

document.getElementById('in-add').onclick = () => {
  const date = document.getElementById('in-date').value;
  const customer = document.getElementById('in-customer').value;
  const bill = document.getElementById('in-bill').value;
  const amount = document.getElementById('in-amount').value;
  if (!amount || !date) return;
  addRow('in', date, customer, bill, amount);
  document.getElementById('in-customer').value = '';
  document.getElementById('in-bill').value = '';
  document.getElementById('in-amount').value = '';
};

document.getElementById('out-add').onclick = () => {
  const date = document.getElementById('out-date').value;
  const supplier = document.getElementById('out-supplier').value;
  const bill = document.getElementById('out-bill').value;
  const amount = document.getElementById('out-amount').value;
  if (!amount || !date) return;
  addRow('out', date, supplier, bill, amount);
  document.getElementById('out-supplier').value = '';
  document.getElementById('out-bill').value = '';
  document.getElementById('out-amount').value = '';
};

document.getElementById('theme-toggle').onclick = () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  setTheme(isDark ? 'light' : 'dark');
};

function setTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('theme', theme);
  document.getElementById('theme-toggle').innerHTML = theme === 'dark' ? '&#9728;' : '&#9789;';
}

(function initTheme(){
  const saved = localStorage.getItem('theme');
  const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  setTheme(saved || (prefersDark ? 'dark' : 'light'));
})();

document.getElementById('logout-btn').onclick = async () => {
  await sb.auth.signOut();
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
};

document.getElementById('login-btn').onclick = login;
document.getElementById('password-input').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

async function login(){
  const password = document.getElementById('password-input').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  const { error } = await sb.auth.signInWithPassword({ email: FIXED_EMAIL, password });
  if (error) { errEl.textContent = 'Incorrect password.'; return; }
  showApp();
}

async function showApp(){
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  setDefaultRange();
  await loadRows();
}

async function init(){
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    showApp();
  } else {
    document.getElementById('login-screen').style.display = 'flex';
  }
}

document.addEventListener('click', (e) => {
  if (e.target.matches('input[type="date"]') && e.target.showPicker) {
    e.target.showPicker();
  }
});

['in-date','in-customer','in-bill','in-amount'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('in-add').click(); }
  });
});
['out-date','out-supplier','out-bill','out-amount'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('out-add').click(); }
  });
});

init();

const columnsEl = document.querySelector('.columns');
const dots = document.querySelectorAll('#swipe-hint .dot');
if (columnsEl && dots.length) {
  columnsEl.addEventListener('scroll', () => {
    const idx = Math.round(columnsEl.scrollLeft / columnsEl.clientWidth);
    dots.forEach((d, i) => d.classList.toggle('active', i === idx));
  }, { passive: true });
}
</script>
</body>
</html>
